{% extends "simulator/base.html" %}

{% block content %}

<div class="result-wrapper">
    <!-- jouw bestaande content blijft hier gewoon staan -->
<style>
.highlight {
    display: block;
    font-size: 22px;
    font-weight: 700;
    margin: 30px 0 10px 0;
    line-height: 1.4;
}

</style>

<div class="card">

    <p style="
        font-size:22px;
        font-weight:600;
        line-height:1.4;
        margin-bottom:20px;
    ">
        {{ caption }}
    </p>

    <div class="result">
        {{ story|safe }}
    </div>

    <div style="margin-top:30px;">
        {{ highlight|safe }}
    </div>

</div>

<button onclick="copyText()" style="
    margin-top:10px;
    width:100%;
    padding:12px;
    background:white;
    color:black;
    border:none;
    border-radius:8px;
">
    Copy for sharing
</button>

<script>
function copyText() {
    const text = `{{ caption }}\n\n{{ story|striptags }}`;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}
</script>

<a href="/">
    <button style="margin-top:20px;">
        Try another scenario
    </button>
</a>

</div>

{% endblock %}
