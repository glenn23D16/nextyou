<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextYou</title>
    <style>
        body {
            margin: 0;
            font-family: 'Courier New', monospace;
            background: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            color: #ccc;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: white;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .result {
            white-space: normal;
            margin-top: 10px;
            line-height: 1.5;
            font-size: 22px;
            color: #e5e5e5;
        }

        .result p {
            margin-bottom: 14px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }

        .card {
            background: #151515;
            border-radius: 10px;
            padding: 18px;
            margin-top: 20px;
        }

        .highlight {
            font-size: 22px;
            font-weight: 700;
            margin: 30px 0 20px 0;
            line-height: 1.4;
        }

        .result-wrapper {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
            </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
